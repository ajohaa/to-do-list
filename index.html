<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>to-do list</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="apple-touch-icon" sizes="192x192" href="apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" href="https://use.typekit.net/ejm1ayt.css" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-8">
          <h1 class="text-center mb-3">~ to-do list! ~</h1>
          <div class="row align-items-center mb-3">
            <h5 class="col-6">active tasks: <span id="activeTasks">0</span></h5>
            <h5 class="col-6 text-end">
              progress:
              <span id="progress">0%</span>
            </h5>
            <div class="col-6">
              <h5>tasks completed: <span id="completedTasks">0</span></h5>
            </div>
            <div class="col-6 ms-auto">
              <div class="progress">
                <div
                  id="progressBar"
                  class="progress-bar"
                  role="progressbar"
                  style="width: 0%"
                  aria-valuenow="0"
                  aria-valuemin="0"
                  aria-valuemax="100"
                ></div>
              </div>
            </div>
          </div>
          <div class="row align-items-center mb-3">
            <div class="col-8">
              <input
                type="text"
                id="taskInput"
                class="form-control"
                placeholder="✎ add a new task..."
              />
            </div>
            <div class="col-4">
              <button id="addTaskBtn" class="btn addTaskBtn btn-primary w-100">
                add task
              </button>
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <div class="scroll-container">
                <div id="emptyState" class="text-center empty-state">
                  there aren't any tasks here for now. <br />
                  go ahead and add some! 🌿
                </div>
                <ul id="taskList" class="list-group mt-2 mb-2"></ul>
              </div>
            </div>
          </div>
          <div class="row align-items-center">
            <div class="col-6">
              <button
                id="clearTaskBtn"
                class="btn clearTaskBtn btn-danger w-100"
              >
                clear all
              </button>
            </div>
            <div class="col-6">
              <button id="undoBtn" class="btn undoBtn btn-primary w-100">
                undo
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="scripts.js"></script>
  </body>
</html>
